name: React Perf Analyzer

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  react-perf-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # La acción compuesta instala el binario vía `cargo install`; en ubuntu-latest no viene Rust por defecto.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # No existe el tag v0.5 en el repo de la acción; usar rama main (o un SHA fijo si se quiere pin).
      - name: React performance and security scan
        uses: rashvish18/react-perf-analyzer@main
        with:
          path: './src'
          fail-on: 'high'
          # Sin baseline el CLI sale con error si hay *cualquier* hallazgo (cientos en src).
          # El JSON en repo suprime lo conocido; CI falla solo si aparecen issues nuevos.
          baseline: '.sast-baseline.json'
          upload-sarif: 'true'
